name: Fetch Bicing data

on:
  schedule:
    # Cada 30 min (UTC), desplaçat +7 min per evitar col·lisions de GitHub a :00/:30
    # (els jobs programats sovint s'endarrereixen o es perden a la hora en punt).
    - cron: "7,37 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "public/data/**"

concurrency:
  group: bicing-fetch
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch static data if missing
        if: hashFiles('public/data/static/barris.geojson') == ''
        run: python scripts/fetch_static_data.py

      - name: Ingest and export
        env:
          # Open Data BCN (mateix API que bicing-hassio); GBFS només si falla o falta token
          BICING_TOKEN: ${{ secrets.BICING_TOKEN }}
        run: |
          python scripts/init_db.py
          python scripts/ingest.py
          python scripts/export.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --staged --quiet; then
            echo "No data changes to commit."
            exit 0
          fi
          git commit -m "Actualitza dades Bicing"
          for attempt in 1 2 3 4; do
            if git pull --rebase origin main; then
              git push origin main
              exit 0
            fi
            git rebase --abort 2>/dev/null || true
            if [ "$attempt" -eq 4 ]; then
              echo "Failed to rebase onto main after ${attempt} attempts."
              exit 1
            fi
            sleep $((attempt * 4))
          done
