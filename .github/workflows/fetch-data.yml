name: Fetch Bicing data

on:
  schedule:
    # Cada 30 min (UTC). GitHub pot endarrerir jobs programats uns minuts.
    - cron: "0,30 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "public/data/**"

concurrency:
  group: bicing-fetch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch static data if missing
        if: hashFiles('public/data/static/barris.geojson') == ''
        run: python scripts/fetch_static_data.py

      - name: Ingest and export
        env:
          BICING_TOKEN: ${{ secrets.BICING_TOKEN }}
        run: |
          python scripts/init_db.py
          python scripts/ingest.py
          python scripts/export.py

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        with:
          add: "public/data"
          message: "Actualitza dades Bicing"
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com
          pull: "--rebase --autostash origin main"
