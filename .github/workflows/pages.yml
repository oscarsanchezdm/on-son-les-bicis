name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    # Els commits de dades fets per fetch-data (GITHUB_TOKEN) no disparen push;
    # workflow_run (al completar fetch) + schedule cobreixen aquest cas.
    paths-ignore:
      - "public/data/**"
  workflow_dispatch:
  workflow_run:
    workflows: ["Fetch Bicing data"]
    types: [completed]
    branches: [main]
  schedule:
    # Cada 30 min, uns minuts després del fetch, per si workflow_run falla.
    - cron: "2,32 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      # fetch-data arrenca a head_sha però commiteja dades noves després; cal el tip de main.
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Sync latest main (post data commit)
        if: github.event_name == 'workflow_run'
        run: git pull --ff-only origin main

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm install
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
