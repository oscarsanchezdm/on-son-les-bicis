services:
  ingest:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: on-son-les-bicis-ingest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /data/history.db
    volumes:
      - ./db:/data
      - .:/app
      - ./deploy/ssh:/root/.ssh:ro
